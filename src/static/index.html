<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kegtron Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .device-card {
            margin-bottom: 20px;
            height: 200px;
            position: relative;
        }
        .device-card .card-body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .device-header {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .device-name {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .device-name h5 {
            margin-bottom: 10px;
        }
        .volume-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #28a745;
        }
        .volume-display.low {
            color: #ffc107;
        }
        .volume-display.empty {
            color: #dc3545;
        }
        .update-time {
            font-size: 0.8rem;
            color: #6c757d;
            position: absolute;
            bottom: 10px;
            left: 15px;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
        .error-message {
            text-align: center;
            padding: 50px;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Kegtron Dashboard</h1>
        <div id="loading" class="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading devices...</p>
        </div>
        <div id="error" class="error-message" style="display: none;"></div>
        <div id="devices" class="row" style="display: none;"></div>
    </div>

    <script>
        function formatDateTime(isoString) {
            if (!isoString) return 'Never';
            const date = new Date(isoString);
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            return `${month}/${day}/${year} ${hours}:${minutes}:${seconds}`;
        }

        function calculateVolumeLeft(startVolume, totalVolume) {
            if (startVolume == null || totalVolume == null) return null;
            return startVolume - totalVolume;
        }

        function getVolumeClass(volumeLeft, kegSize) {
            if (volumeLeft == null || kegSize == null) return '';
            const percentage = (volumeLeft / kegSize) * 100;
            if (percentage <= 10) return 'empty';
            if (percentage <= 25) return 'low';
            return '';
        }

        function createDeviceCard(deviceId, device, port) {
            const portIndex = port.port_index;
            const volumeLeft = calculateVolumeLeft(port.start_volume, port.total_volume);
            const volumeClass = getVolumeClass(volumeLeft, port.keg_size);
            
            // Determine the display name
            let displayName = device.name;
            let headerInfo = `${deviceId} Port ${portIndex}`;
            
            if (!device.name) {
                displayName = `${deviceId} Port ${portIndex}`;
                if (device.model) {
                    headerInfo = `${device.model}`;
                } else {
                    headerInfo = 'UNKNOWN MODEL'
                }
            } else if (device.model) {
                headerInfo += ` (${device.model})`;
            }

            const volumeDisplay = volumeLeft != null ? 
                `${Math.round(volumeLeft * 1000)} mL` : 
                'No data';

            const updateTime = port.updated_at || device.updated_at || device.last_advertisement_timestamp_utc;

            return `
                <div class="col-md-6 col-lg-4">
                    <div class="card device-card">
                        <div class="card-body">
                            <div class="device-header">${headerInfo}</div>
                            <div class="device-name">
                                <h5>${displayName}</h5>
                                <div class="volume-display ${volumeClass}">${volumeDisplay}</div>
                            </div>
                            <div class="update-time">
                                Updated: ${formatDateTime(updateTime)}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function loadDevices() {
            $.ajax({
                url: '/api/v1/devices',
                method: 'GET',
                success: function(data) {
                    $('#loading').hide();
                    const devicesContainer = $('#devices');
                    devicesContainer.empty();
                    
                    let hasDevices = false;
                    
                    // Iterate through all devices
                    for (const device of data) {
                        const deviceId = device.id
                        // If device has ports, create a card for each port
                        if (device.ports && Object.keys(device.ports).length > 0) {
                            for (const [portIndex, port] of Object.entries(device.ports)) {
                                devicesContainer.append(createDeviceCard(deviceId, device, port));
                                hasDevices = true;
                            }
                        } else {
                            // If no ports, create a single card for the device
                            const dummyPort = {
                                port_index: 0,
                                keg_size: null,
                                total_volume: null,
                                start_volume: null,
                                updated_at: null
                            };
                            devicesContainer.append(createDeviceCard(deviceId, device, dummyPort));
                            hasDevices = true;
                        }
                    }
                    
                    if (!hasDevices) {
                        devicesContainer.html('<div class="col-12 text-center"><p>No devices found</p></div>');
                    }
                    
                    devicesContainer.show();
                },
                error: function(xhr, status, error) {
                    $('#loading').hide();
                    $('#error').text(`Error loading devices: ${error}`).show();
                }
            });
        }

        $(document).ready(function() {
            loadDevices();
            // Refresh every 10 seconds
            setInterval(loadDevices, 10000);
        });
    </script>
</body>
</html>
