<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kegtron Gen1 - Device Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Kegtron Gen1 - Device Dashboard</h1>
        <div class="text-center mb-3">
            <div class="row justify-content-center align-items-center">
                <div class="col-auto">
                    <div class="form-check form-switch d-inline-block">
                        <input class="form-check-input" type="checkbox" id="autoRefreshToggle" checked>
                        <label class="form-check-label" for="autoRefreshToggle">
                            Auto Refresh: <span id="refreshStatus">ON</span>
                        </label>
                    </div>
                </div>
                <div class="col-auto">
                    <select class="form-select form-select-sm" id="refreshInterval" style="width: 120px;">
                        <option value="5">5 seconds</option>
                        <option value="10" selected>10 seconds</option>
                        <option value="15">15 seconds</option>
                        <option value="30">30 seconds</option>
                        <option value="60">60 seconds</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button class="btn btn-sm btn-primary" onclick="manualRefresh()">
                        <span id="refreshBtnText">Refresh Now</span>
                    </button>
                </div>
            </div>
            <div class="row justify-content-center mt-2">
                <div class="col-auto">
                    <small class="text-muted">Last refreshed: <span id="lastRefreshed">Never</span></small>
                </div>
            </div>
        </div>
        <div id="loading" class="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading devices...</p>
        </div>
        <div id="error" class="error-message" style="display: none;"></div>
        <div id="devices" class="row" style="display: none;"></div>
    </div>

    <script>
        function formatDateTime(isoString) {
            if (!isoString) return 'Never';
            const date = new Date(isoString);
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            return `${month}/${day}/${year} ${hours}:${minutes}:${seconds}`;
        }

        function calculatePercentLeft(kegSize, volumeLeft) {
            if (kegSize == null || volumeLeft == null) return null;
            return ((volumeLeft / kegSize) * 100).toFixed(2);
        }

        function calculateVolumeLeft(startVolume, volumeDispensed) {
            if (startVolume == null || volumeDispensed == null) return null;
            return (startVolume - volumeDispensed).toFixed(2);
        }

        function getVolumeClass(percentLeft) {
            if (percentLeft <= 10) return 'empty';
            if (percentLeft <= 25) return 'low';
            return '';
        }

        function createDeviceCard(deviceId, device, port) {
            const portIndex = port.portIndex;
            const volumeLeft = calculateVolumeLeft(port.startVolume, port.volumeDispensed);
            const percentLeft = calculatePercentLeft(port.kegSize, volumeLeft);
            const volumeClass = getVolumeClass(percentLeft);
            const displayUnit = port.displayUnit || 'mL';
            
            let model = 'UNKNOWN MODEL'
            if (device.model) {
                model = device.model;
            }

            // Determine the display name
            let displayName = `${device.name} (${port.portName})`;
            let headerInfo = `${deviceId} - Port ${portIndex} (${model})`;
            
            if (!device.name) {
                displayName = `${deviceId} - ${port.portName}`;
                headerInfo = `Port ${portIndex} (${model})`;
                if (!port.portName) {
                    displayName = `${deviceId} - Port ${portIndex}`;
                    headerInfo = `${model}`;
                }
            } else if (!port.portName) {
                displayName = `${device.name} - Port (${portIndex})`;
                headerInfo = `${deviceId} (${model})`;
            }

            const volumeDisplay = volumeLeft != null ? 
                `${volumeLeft} ${displayUnit} (${percentLeft} %)` : 
                'No data';

            const updateTime = port.lastUpdateTimestampUtc || device.lastAdvertisementTimestampUtc;
            
            // Generate unique card ID
            const cardId = `card-${deviceId}-${portIndex}`.replace(/[^a-zA-Z0-9-]/g, '-');

            return `
                <div class="col-md-6 col-lg-4">
                    <div class="card device-card" id="${cardId}">
                        <div class="card-body">
                            <a href="/config.html?device_id=${deviceId}" class="settings-icon" title="Configure Device">
                                <span class="material-icons">settings</span>
                            </a>
                            <div class="device-header">${headerInfo}</div>
                            <div class="device-name">
                                <h5>${displayName}</h5>
                                <div class="volume-display ${volumeClass}">${volumeDisplay}</div>
                            </div>
                            <div class="update-time">
                                Updated: ${formatDateTime(updateTime)}
                            </div>
                            <div class="details-toggle" onclick="toggleDetails('${cardId}')">
                                more details
                            </div>
                            <div class="device-details" id="${cardId}-details">
                                <div class="detail-row">
                                    <span class="detail-label">Device ID:</span>
                                    <span class="detail-value">${deviceId}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">MAC Address:</span>
                                    <span class="detail-value">${device.mac || 'N/A'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Port Index:</span>
                                    <span class="detail-value">${portIndex}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Port Name:</span>
                                    <span class="detail-value">${port.portName || 'Not Set'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Keg Size:</span>
                                    <span class="detail-value">${port.kegSize != null ? `${port.kegSize} ${displayUnit}` : 'N/A'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Start Volume:</span>
                                    <span class="detail-value">${port.startVolume != null ? `${port.startVolume} ${displayUnit}` : 'N/A'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Volume Dispensed:</span>
                                    <span class="detail-value">${port.volumeDispensed != null ? `${port.volumeDispensed} ${displayUnit}` : 'N/A'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Signal Strength:</span>
                                    <span class="detail-value">${device.rssi != null ? `${device.rssi} dBm` : 'N/A'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Port Count:</span>
                                    <span class="detail-value">${device.portCnt || 'N/A'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Pulse Count:</span>
                                    <span class="detail-value">${port.pulseCount || 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleDetails(cardId) {
            const card = document.getElementById(cardId);
            const details = document.getElementById(`${cardId}-details`);
            const toggle = card.querySelector('.details-toggle');
            
            if (details.classList.contains('show')) {
                // Hide details
                details.classList.remove('show');
                card.classList.remove('expanded');
                toggle.textContent = 'more details';
                expandedCards.delete(cardId); // Remove from expanded set
            } else {
                // Show details
                details.classList.add('show');
                card.classList.add('expanded');
                toggle.textContent = 'less details';
                expandedCards.add(cardId); // Add to expanded set
            }
        }

        function updateLastRefreshed() {
            const now = new Date();
            const formatted = formatDateTime(now.toISOString());
            $('#lastRefreshed').text(formatted);
        }

        function restoreExpandedStates() {
            expandedCards.forEach(cardId => {
                const card = document.getElementById(cardId);
                if (card) {
                    const details = document.getElementById(`${cardId}-details`);
                    const toggle = card.querySelector('.details-toggle');
                    if (details && toggle) {
                        details.classList.add('show');
                        card.classList.add('expanded');
                        toggle.textContent = 'less details';
                    }
                }
            });
        }

        function loadDevices() {
            $.ajax({
                url: '/api/v1/devices',
                method: 'GET',
                success: function(data) {
                    $('#loading').hide();
                    const devicesContainer = $('#devices');
                    devicesContainer.empty();
                    
                    let hasDevices = false;
                    
                    // Iterate through all devices
                    for (const device of data) {
                        const deviceId = device.id
                        // If device has ports, create a card for each port
                        if (device.ports && Object.keys(device.ports).length > 0) {
                            for (const [portIndex, port] of Object.entries(device.ports)) {
                                devicesContainer.append(createDeviceCard(deviceId, device, port));
                                hasDevices = true;
                            }
                        } else {
                            // If no ports, create a single card for the device
                            const dummyPort = {
                                portIndex: 0,
                                kegSize: null,
                                volumeDispensed: null,
                                startVolume: null,
                                updatedAt: null
                            };
                            devicesContainer.append(createDeviceCard(deviceId, device, dummyPort));
                            hasDevices = true;
                        }
                    }
                    
                    if (!hasDevices) {
                        devicesContainer.html('<div class="col-12 text-center"><p>No devices found</p></div>');
                    }
                    
                    devicesContainer.show();
                    restoreExpandedStates(); // Restore expanded cards after refresh
                    updateLastRefreshed();
                },
                error: function(xhr, status, error) {
                    $('#loading').hide();
                    $('#error').text(`Error loading devices: ${error}`).show();
                }
            });
        }

        let refreshInterval = null;
        let autoRefreshEnabled = true;
        let expandedCards = new Set(); // Track which cards are expanded

        function getRefreshInterval() {
            return parseInt($('#refreshInterval').val()) * 1000;
        }

        function startAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
            const intervalMs = getRefreshInterval();
            refreshInterval = setInterval(loadDevices, intervalMs);
        }

        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        function toggleAutoRefresh() {
            const toggle = document.getElementById('autoRefreshToggle');
            const status = document.getElementById('refreshStatus');
            
            autoRefreshEnabled = toggle.checked;
            
            if (autoRefreshEnabled) {
                status.textContent = 'ON';
                status.classList.remove('off');
                startAutoRefresh();
                console.log('Auto-refresh enabled');
            } else {
                status.textContent = 'OFF';
                status.classList.add('off');
                stopAutoRefresh();
                console.log('Auto-refresh disabled');
            }
        }

        function manualRefresh() {
            const button = document.getElementById('refreshBtnText');
            button.textContent = 'Refreshing...';
            loadDevices();
            setTimeout(() => {
                button.textContent = 'Refresh Now';
            }, 500);
        }

        $(document).ready(function() {
            // Load devices initially
            loadDevices();
            
            // Set up auto-refresh toggle
            document.getElementById('autoRefreshToggle').addEventListener('change', toggleAutoRefresh);
            
            // Set up interval dropdown change handler
            $('#refreshInterval').on('change', function() {
                if (autoRefreshEnabled) {
                    // Restart auto-refresh with new interval
                    startAutoRefresh();
                }
            });
            
            // Start auto-refresh if enabled (default)
            if (autoRefreshEnabled) {
                startAutoRefresh();
            }
        });
    </script>
</body>
</html>
